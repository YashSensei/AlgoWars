name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Dummy values — satisfy env-schema shape for module load; the test suite only hits /health
  # which doesn't actually talk to Postgres, Supabase, or MegaLLM.
  DATABASE_URL: postgresql://test:test@localhost:5432/test
  SUPABASE_URL: https://example.supabase.co
  SUPABASE_SECRET_KEY: sb_secret_dummy_ci_value
  MEGALLM_API_KEY: dummy-key-for-ci

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Lint (Biome)
        run: bun run lint

      - name: Check function complexity
        run: bun run check:functions

      - name: Build
        run: bun run build

      - name: Test
        run: bun test
